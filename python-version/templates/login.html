{% extends "base.html" %}
{% block title %}Login — TruthLens{% endblock %}
{% block content %}
<div class="auth-card">
  <h1>Welcome back</h1>
  <form method="post" class="form">
    <label>Email
      <input type="email" name="email" required autocomplete="email" />
    </label>
    <label>Password
      <input type="password" name="password" required autocomplete="current-password" />
    </label>
    <button class="btn btn-primary" type="submit">Login</button>
  </form>
  <p class="muted">No account? <a href="{{ url_for('auth.register') }}">Sign up</a></p>
</div>
{% endblock %}
